<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orion Program – Missionslog</title>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;400;500;600;700&family=Electrolize&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg-deep:#060a14;--bg-mid:#0c1225;--bg-card:rgba(12,18,40,0.88);--bg-card-hover:rgba(18,28,58,0.95);
--bg-input:#0e1530;--bg-modal:rgba(4,6,14,0.92);
--accent-cyan:#00e5ff;--accent-orange:#ff6d2e;--accent-green:#39ff7f;--accent-purple:#b388ff;
--accent-yellow:#ffd740;--accent-red:#ff5252;--accent-pink:#ff80ab;--accent-blue:#448aff;
--text-bright:#e0e4f0;--text-muted:#6878a0;--text-dim:#3a4568;
--border-glow:rgba(0,229,255,0.12);--border-subtle:rgba(255,255,255,0.06);
}
html{scroll-behavior:smooth}
body{background:var(--bg-deep);color:var(--text-bright);font-family:'Electrolize',monospace;min-height:100vh;overflow-x:hidden}

/* === STARFIELD === */
.starfield{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.star{position:absolute;background:#fff;border-radius:50%}
@keyframes twinkle{0%,100%{opacity:.15}50%{opacity:.7}}
@keyframes shootingStar{0%{transform:translateX(0) translateY(0);opacity:1}100%{transform:translateX(300px) translateY(300px);opacity:0}}

/* === NEBULA BG === */
.nebula{position:fixed;inset:0;pointer-events:none;z-index:0;
background:radial-gradient(ellipse at 20% 50%,rgba(0,229,255,0.03) 0%,transparent 50%),
radial-gradient(ellipse at 80% 20%,rgba(179,136,255,0.04) 0%,transparent 50%),
radial-gradient(ellipse at 50% 80%,rgba(255,109,46,0.02) 0%,transparent 50%)}

/* === APP LAYOUT === */
.app{position:relative;z-index:1;max-width:880px;margin:0 auto;padding:2rem 1.2rem 3rem}

/* === HEADER === */
.header{text-align:center;margin-bottom:2.5rem;padding-top:1rem}
.header-logo{display:inline-flex;align-items:center;justify-content:center;width:56px;height:56px;border-radius:50%;border:1.5px solid var(--accent-cyan);margin-bottom:1rem;position:relative}
.header-logo::before{content:'';position:absolute;inset:-4px;border-radius:50%;border:1px solid rgba(0,229,255,0.15);animation:pulse-ring 3s ease-in-out infinite}
@keyframes pulse-ring{0%,100%{transform:scale(1);opacity:.5}50%{transform:scale(1.15);opacity:0}}
.header-logo svg{width:28px;height:28px}
.header h1{font-family:'Chakra Petch',sans-serif;font-size:2rem;font-weight:700;letter-spacing:5px;text-transform:uppercase;background:linear-gradient(135deg,var(--accent-cyan) 0%,var(--accent-purple) 50%,var(--accent-cyan) 100%);background-size:200% 200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:gradShift 6s ease infinite}
@keyframes gradShift{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
.header .sub{font-family:'Share Tech Mono',monospace;font-size:.75rem;color:var(--text-muted);letter-spacing:6px;text-transform:uppercase;margin-top:.25rem}
.header-line{height:1px;background:linear-gradient(90deg,transparent,var(--accent-cyan),transparent);margin:1.2rem auto 0;width:70%;opacity:.5}

/* === STATS === */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.5rem}
@media(max-width:500px){.stats-row{grid-template-columns:repeat(2,1fr)}}
.stat-card{background:var(--bg-card);border:0.5px solid var(--border-glow);border-radius:8px;padding:.7rem .8rem;text-align:center;position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent-cyan);opacity:.3}
.stat-card .val{font-family:'Chakra Petch',sans-serif;font-size:1.5rem;font-weight:700;color:var(--accent-cyan)}
.stat-card .lbl{font-family:'Share Tech Mono',monospace;font-size:.6rem;color:var(--text-muted);letter-spacing:2px;text-transform:uppercase;margin-top:2px}

/* === PROGRESS === */
.progress-wrap{margin-bottom:2rem}
.progress-label{display:flex;justify-content:space-between;font-size:.7rem;color:var(--text-muted);margin-bottom:4px;font-family:'Share Tech Mono',monospace}
.progress-outer{background:rgba(255,255,255,0.04);border-radius:20px;height:6px;overflow:hidden;border:0.5px solid var(--border-glow)}
.progress-inner{height:100%;border-radius:20px;background:linear-gradient(90deg,var(--accent-cyan),var(--accent-purple));transition:width .8s cubic-bezier(.4,0,.2,1)}

/* === TOP ACTIONS === */
.top-actions{display:flex;gap:8px;margin-bottom:1.5rem;flex-wrap:wrap}
.btn{font-family:'Electrolize',monospace;font-size:.78rem;padding:8px 16px;border-radius:6px;border:0.5px solid var(--border-glow);background:var(--bg-card);color:var(--text-bright);cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:6px;letter-spacing:.5px}
.btn:hover{border-color:var(--accent-cyan);background:var(--bg-card-hover)}
.btn:active{transform:scale(.97)}
.btn-accent{border-color:rgba(0,229,255,0.3);color:var(--accent-cyan)}
.btn-danger{border-color:rgba(255,82,82,0.3);color:var(--accent-red)}
.btn-danger:hover{border-color:var(--accent-red)}

/* === PHASES === */
.phase{margin-bottom:1.2rem}
.phase-header{display:flex;align-items:center;gap:10px;padding:8px 0;cursor:pointer;user-select:none}
.phase-icon{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0;border:1.5px solid;font-family:'Chakra Petch',sans-serif}
.phase-title{font-family:'Chakra Petch',sans-serif;font-size:.92rem;font-weight:600;letter-spacing:1px;flex:1;min-width:0}
.phase-counter{font-family:'Share Tech Mono',monospace;font-size:.65rem;color:var(--text-muted);letter-spacing:1px;padding:2px 8px;border:0.5px solid var(--text-dim);border-radius:10px}
.phase-actions{display:flex;gap:4px;margin-left:4px}
.phase-btn{width:24px;height:24px;border-radius:4px;border:0.5px solid var(--border-subtle);background:transparent;color:var(--text-dim);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;transition:all .2s}
.phase-btn:hover{border-color:var(--accent-cyan);color:var(--accent-cyan)}
.phase-btn.delete:hover{border-color:var(--accent-red);color:var(--accent-red)}
.phase-chevron{color:var(--text-dim);font-size:.7rem;transition:transform .3s;margin-left:4px}
.phase-chevron.open{transform:rotate(90deg)}

.mission-list{display:grid;gap:6px;max-height:0;opacity:0;overflow:hidden;transition:max-height .4s ease,opacity .3s ease,padding .3s ease;padding:0 0 0 40px}
.mission-list.expanded{max-height:2000px;opacity:1;padding:4px 0 8px 40px}

.mission-card{background:var(--bg-card);border:0.5px solid var(--border-subtle);border-radius:6px;padding:.65rem .9rem;display:grid;grid-template-columns:auto 1fr auto auto;gap:10px;align-items:center;transition:all .2s}
.mission-card:hover{border-color:var(--border-glow);background:var(--bg-card-hover)}
.mission-status{width:10px;height:10px;border-radius:50%;cursor:pointer;transition:all .3s;flex-shrink:0}
.mission-status.pending{background:var(--text-dim);border:1px solid var(--text-dim)}
.mission-status.complete{background:var(--accent-green);box-shadow:0 0 8px rgba(57,255,127,0.35);border:1px solid var(--accent-green)}
.mission-info .name{font-family:'Chakra Petch',sans-serif;font-size:.82rem;font-weight:500}
.mission-info .desc{font-size:.7rem;color:var(--text-muted);margin-top:2px;line-height:1.4}
.mission-type{font-family:'Share Tech Mono',monospace;font-size:.6rem;color:var(--text-dim);letter-spacing:1px;text-transform:uppercase;white-space:nowrap}
.mission-actions{display:flex;gap:3px}
.m-btn{width:22px;height:22px;border-radius:4px;border:none;background:transparent;color:var(--text-dim);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;transition:color .2s}
.m-btn:hover{color:var(--accent-cyan)}
.m-btn.del:hover{color:var(--accent-red)}

.add-mission-btn{font-family:'Electrolize',monospace;font-size:.7rem;color:var(--text-dim);cursor:pointer;padding:6px 0;display:flex;align-items:center;gap:6px;transition:color .2s;border:none;background:none}
.add-mission-btn:hover{color:var(--accent-cyan)}

/* === MODAL === */
.modal-overlay{position:fixed;inset:0;background:var(--bg-modal);z-index:100;display:none;align-items:center;justify-content:center;padding:1rem;backdrop-filter:blur(8px)}
.modal-overlay.active{display:flex}
.modal{background:var(--bg-mid);border:0.5px solid var(--border-glow);border-radius:10px;padding:1.8rem;width:100%;max-width:440px;position:relative;animation:modalIn .25s ease}
@keyframes modalIn{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal h2{font-family:'Chakra Petch',sans-serif;font-size:1rem;font-weight:600;letter-spacing:1px;color:var(--accent-cyan);margin-bottom:1.2rem}
.modal-close{position:absolute;top:12px;right:14px;background:none;border:none;color:var(--text-dim);font-size:18px;cursor:pointer;padding:4px}
.modal-close:hover{color:var(--text-bright)}
.form-group{margin-bottom:1rem}
.form-group label{display:block;font-size:.7rem;color:var(--text-muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:5px;font-family:'Share Tech Mono',monospace}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:9px 12px;background:var(--bg-input);border:0.5px solid var(--border-glow);border-radius:6px;color:var(--text-bright);font-family:'Electrolize',monospace;font-size:.82rem;outline:none;transition:border-color .2s}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--accent-cyan)}
.form-group textarea{resize:vertical;min-height:60px}
.form-group select{cursor:pointer;-webkit-appearance:none;appearance:none}
.color-options{display:flex;gap:8px;flex-wrap:wrap}
.color-opt{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .2s;position:relative}
.color-opt:hover,.color-opt.selected{border-color:#fff;transform:scale(1.15)}
.color-opt.selected::after{content:'✓';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:12px;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.5)}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:1.5rem}
.modal-btn{font-family:'Electrolize',monospace;font-size:.78rem;padding:8px 20px;border-radius:6px;border:0.5px solid;cursor:pointer;transition:all .2s}
.modal-btn.cancel{background:transparent;border-color:var(--border-glow);color:var(--text-muted)}
.modal-btn.cancel:hover{border-color:var(--text-muted);color:var(--text-bright)}
.modal-btn.save{background:rgba(0,229,255,0.1);border-color:var(--accent-cyan);color:var(--accent-cyan)}
.modal-btn.save:hover{background:rgba(0,229,255,0.2)}
.modal-btn:active{transform:scale(.97)}

/* === LEGEND === */
.legend{display:flex;gap:1.5rem;justify-content:center;margin-top:2rem;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:6px;font-size:.68rem;color:var(--text-muted);font-family:'Share Tech Mono',monospace}
.legend-dot{width:8px;height:8px;border-radius:50%}

/* === FOOTER === */
.footer{text-align:center;margin-top:2.5rem;padding-top:1rem;border-top:0.5px solid rgba(255,255,255,0.04)}
.footer p{font-family:'Share Tech Mono',monospace;font-size:.6rem;color:var(--text-dim);letter-spacing:3px;text-transform:uppercase}

/* === TOAST === */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--bg-mid);border:0.5px solid var(--accent-cyan);border-radius:8px;padding:10px 20px;font-size:.78rem;color:var(--accent-cyan);z-index:200;transition:transform .3s ease,opacity .3s ease;opacity:0;pointer-events:none;font-family:'Electrolize',monospace}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}

/* === SCROLLBAR === */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg-deep)}
::-webkit-scrollbar-thumb{background:var(--text-dim);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--text-muted)}

/* === CONFIRM DIALOG === */
.confirm-overlay{position:fixed;inset:0;background:var(--bg-modal);z-index:150;display:none;align-items:center;justify-content:center;padding:1rem;backdrop-filter:blur(8px)}
.confirm-overlay.active{display:flex}
.confirm-box{background:var(--bg-mid);border:0.5px solid rgba(255,82,82,0.3);border-radius:10px;padding:1.5rem;max-width:360px;text-align:center;animation:modalIn .25s ease}
.confirm-box p{font-size:.85rem;margin-bottom:1.2rem;line-height:1.5}
.confirm-box .confirm-actions{display:flex;gap:8px;justify-content:center}
</style>
</head>
<body>

<div class="starfield" id="starfield"></div>
<div class="nebula"></div>

<div class="app">
  <div class="header">
    <div class="header-logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="var(--accent-cyan)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L12 6M12 18L12 22M4.93 4.93L7.76 7.76M16.24 16.24L19.07 19.07M2 12H6M18 12H22M4.93 19.07L7.76 16.24M16.24 7.76L19.07 4.93"/><circle cx="12" cy="12" r="4"/></svg>
    </div>
    <h1>Orion Program</h1>
    <div class="sub">Missionslog</div>
    <div class="header-line"></div>
  </div>

  <div class="stats-row">
    <div class="stat-card"><div class="val" id="totalMissions">0</div><div class="lbl">Missioner</div></div>
    <div class="stat-card"><div class="val" id="completedMissions">0</div><div class="lbl">Fuldført</div></div>
    <div class="stat-card"><div class="val" id="totalPhases">0</div><div class="lbl">Faser</div></div>
    <div class="stat-card"><div class="val" id="progressPct">0%</div><div class="lbl">Fremgang</div></div>
  </div>

  <div class="progress-wrap">
    <div class="progress-label"><span>Mission fremgang</span><span id="progressText">0/0</span></div>
    <div class="progress-outer"><div class="progress-inner" id="progressBar"></div></div>
  </div>

  <div class="top-actions">
    <button class="btn btn-accent" onclick="openPhaseModal()">+ Ny fase</button>
    <button class="btn" onclick="expandAll()">Udvid alle</button>
    <button class="btn" onclick="collapseAll()">Luk alle</button>
    <button class="btn" onclick="exportData()">Eksportér data</button>
    <button class="btn" onclick="importDataPrompt()">Importér data</button>
  </div>

  <div id="phases"></div>

  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:var(--accent-green)"></div>Fuldført</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--text-dim)"></div>Afventer</div>
  </div>

  <div class="footer"><p>Kerbal Space Program &mdash; Orion Program &mdash; Missionslog</p></div>
</div>

<!-- Phase Modal -->
<div class="modal-overlay" id="phaseModal">
  <div class="modal">
    <button class="modal-close" onclick="closePhaseModal()">&times;</button>
    <h2 id="phaseModalTitle">Ny fase</h2>
    <div class="form-group">
      <label>Fase navn</label>
      <input type="text" id="phaseNameInput" placeholder="F.eks. Fase 7: Eve Program">
    </div>
    <div class="form-group">
      <label>Ikon (1-2 tegn)</label>
      <input type="text" id="phaseIconInput" placeholder="F.eks. E" maxlength="2">
    </div>
    <div class="form-group">
      <label>Farve</label>
      <div class="color-options" id="colorOptions"></div>
    </div>
    <div class="modal-actions">
      <button class="modal-btn cancel" onclick="closePhaseModal()">Annuller</button>
      <button class="modal-btn save" onclick="savePhase()">Gem</button>
    </div>
  </div>
</div>

<!-- Mission Modal -->
<div class="modal-overlay" id="missionModal">
  <div class="modal">
    <button class="modal-close" onclick="closeMissionModal()">&times;</button>
    <h2 id="missionModalTitle">Ny mission</h2>
    <div class="form-group">
      <label>Missionsnavn</label>
      <input type="text" id="missionNameInput" placeholder="F.eks. Orion E1 – Explorer">
    </div>
    <div class="form-group">
      <label>Type</label>
      <input type="text" id="missionTypeInput" placeholder="F.eks. Orbiter, Lander, Flyby">
    </div>
    <div class="form-group">
      <label>Mission / Formål</label>
      <textarea id="missionDescInput" placeholder="Beskriv missionens formål..."></textarea>
    </div>
    <div class="modal-actions">
      <button class="modal-btn cancel" onclick="closeMissionModal()">Annuller</button>
      <button class="modal-btn save" onclick="saveMission()">Gem</button>
    </div>
  </div>
</div>

<!-- Confirm Dialog -->
<div class="confirm-overlay" id="confirmDialog">
  <div class="confirm-box">
    <p id="confirmText">Er du sikker?</p>
    <div class="confirm-actions">
      <button class="modal-btn cancel" onclick="closeConfirm()">Annuller</button>
      <button class="modal-btn save" style="border-color:var(--accent-red);color:var(--accent-red);background:rgba(255,82,82,0.1)" onclick="doConfirm()">Slet</button>
    </div>
  </div>
</div>

<!-- Import (hidden) -->
<input type="file" id="importFile" accept=".json" style="display:none" onchange="handleImport(event)">

<div class="toast" id="toast"></div>

<script>
// ===================== DATA =====================
const COLORS = [
  {name:'Cyan',val:'#00e5ff'},{name:'Grøn',val:'#39ff7f'},{name:'Gul',val:'#ffd740'},
  {name:'Orange',val:'#ff6d2e'},{name:'Rød',val:'#ff5252'},{name:'Lilla',val:'#b388ff'},
  {name:'Pink',val:'#ff80ab'},{name:'Blå',val:'#448aff'}
];

const DEFAULT_DATA = [
  {id:genId(),title:"Fase 1: Tidlige tests",icon:"T",color:"#00e5ff",missions:[
    {id:genId(),name:"Orion T0 – Ignition",type:"Ground Test",desc:"Tænd motor på launchpad. Test thrust og stabilitet.",done:false},
    {id:genId(),name:"Orion T1 – Pathfinder",type:"Suborbital",desc:"Første hop (suborbital science). Sikker landing.",done:false},
    {id:genId(),name:"Orion T2 – Trailblazer",type:"Høj Suborbital",desc:"Højere hop + test af staging.",done:false},
    {id:genId(),name:"Orion T3 – Frontier",type:"Space / Near Orbit",desc:"Nå 70km+ (første tur i rummet).",done:false}
  ]},
  {id:genId(),title:"Fase 2: Første orbit",icon:"O",color:"#39ff7f",missions:[
    {id:genId(),name:"Orion O1 – Pioneer",type:"Orbiter",desc:"Første stabile orbit om Kerbin.",done:false},
    {id:genId(),name:"Orion O2 – Surveyor",type:"Orbiter",desc:"Stabil orbit + science indsamling.",done:false},
    {id:genId(),name:"Orion O3 – Sentinel",type:"Satellit",desc:"Opsætning af CommNet / satellitter.",done:false}
  ]},
  {id:genId(),title:"Fase 3: Mun program",icon:"M",color:"#ffd740",missions:[
    {id:genId(),name:"Orion M1 – Seeker",type:"Flyby",desc:"Første flyby af Mun.",done:false},
    {id:genId(),name:"Orion M2 – Observer",type:"Orbiter",desc:"Etablering af orbit omkring Mun.",done:false},
    {id:genId(),name:"Orion M3 – Lander",type:"Lander",desc:"Første landing på Mun.",done:false},
    {id:genId(),name:"Orion M4 – Base Alpha",type:"Base / Lander",desc:"Flere landinger eller base-modul.",done:false}
  ]},
  {id:genId(),title:"Fase 4: Minmus",icon:"m",color:"#b388ff",missions:[
    {id:genId(),name:"Orion MM1 – Scout",type:"Flyby",desc:"Første flyby af Minmus.",done:false},
    {id:genId(),name:"Orion MM2 – Prospector",type:"Lander",desc:"Landing + science farm på Minmus.",done:false}
  ]},
  {id:genId(),title:"Fase 5: Duna program",icon:"D",color:"#ff6d2e",missions:[
    {id:genId(),name:"Orion D1 – Pathfinder",type:"Flyby",desc:"Første interplanetariske flyby.",done:false},
    {id:genId(),name:"Orion D2 – Orbiter",type:"Orbiter",desc:"Orbit og scanning af Duna.",done:false},
    {id:genId(),name:"Orion D3 – Lander",type:"Lander",desc:"Første landing på Duna.",done:false},
    {id:genId(),name:"Orion D4 – Return",type:"Return Mission",desc:"Landing og retur til Kerbin.",done:false}
  ]},
  {id:genId(),title:"Fase 6: Deep space",icon:"X",color:"#ff5252",missions:[
    {id:genId(),name:"Orion X1 – Voyager",type:"Probe",desc:"Eve / Dres missioner.",done:false},
    {id:genId(),name:"Orion X2 – Odyssey",type:"Manned/Probe",desc:"Jool system udforskning.",done:false},
    {id:genId(),name:"Orion X3 – Infinity",type:"Grand Tour",desc:"Multi-planet mission.",done:false}
  ]},
  {id:genId(),title:"Special-serier",icon:"S",color:"#ff80ab",missions:[
    {id:genId(),name:"Orion C1 – Hauler",type:"Cargo",desc:"Lille til medium fragtraket.",done:false},
    {id:genId(),name:"Orion C2 – Heavy Lift",type:"Cargo",desc:"Kæmpe raket til tunge moduler.",done:false},
    {id:genId(),name:"Orion Station Alpha",type:"Station",desc:"Rumstation i bane om Kerbin.",done:false},
    {id:genId(),name:"Orion Station Beta",type:"Station",desc:"Rumstation i bane om Mun.",done:false}
  ]}
];

function genId(){return 'id_'+Math.random().toString(36).substr(2,9)}

let phases = [];
let expanded = {};
let editingPhaseId = null;
let editingMissionId = null;
let addMissionToPhaseId = null;
let selectedColor = COLORS[0].val;
let confirmCallback = null;

// ===================== STORAGE =====================
function loadData(){
  try{
    const d = localStorage.getItem('ksp_orion_v2');
    if(d){ phases = JSON.parse(d); return; }
  }catch(e){}
  phases = JSON.parse(JSON.stringify(DEFAULT_DATA));
  saveData();
}
function saveData(){
  try{ localStorage.setItem('ksp_orion_v2', JSON.stringify(phases)); }catch(e){}
}

// ===================== STARS =====================
function createStars(){
  const sf = document.getElementById('starfield');
  for(let i=0;i<150;i++){
    const s=document.createElement('div');s.className='star';
    const sz=Math.random()*2+0.5;
    s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;opacity:${Math.random()*0.5+0.1};animation:twinkle ${Math.random()*5+2}s ease-in-out infinite ${Math.random()*5}s`;
    sf.appendChild(s);
  }
}

// ===================== TOAST =====================
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

// ===================== STATS =====================
function updateStats(){
  let total=0,done=0;
  phases.forEach(p=>p.missions.forEach(m=>{total++;if(m.done)done++;}));
  document.getElementById('totalMissions').textContent=total;
  document.getElementById('completedMissions').textContent=done;
  document.getElementById('totalPhases').textContent=phases.length;
  const pct=total?Math.round(done/total*100):0;
  document.getElementById('progressPct').textContent=pct+'%';
  document.getElementById('progressBar').style.width=pct+'%';
  document.getElementById('progressText').textContent=done+'/'+total;
}

// ===================== RENDER =====================
function render(){
  const el=document.getElementById('phases');
  el.innerHTML='';
  phases.forEach((p,pi)=>{
    const done=p.missions.filter(m=>m.done).length;
    const total=p.missions.length;
    const isOpen=expanded[p.id]||false;

    const phaseDiv=document.createElement('div');
    phaseDiv.className='phase';

    // Header
    const header=document.createElement('div');
    header.className='phase-header';
    header.innerHTML=`
      <div class="phase-icon" style="border-color:${p.color};color:${p.color}">${p.icon}</div>
      <div class="phase-title" style="color:${p.color}">${p.title}</div>
      <div class="phase-counter">${done}/${total}</div>
      <div class="phase-actions">
        <button class="phase-btn" title="Rediger fase" data-edit="${p.id}">&#9998;</button>
        <button class="phase-btn delete" title="Slet fase" data-del="${p.id}">&times;</button>
      </div>
      <div class="phase-chevron ${isOpen?'open':''}">&#9654;</div>
    `;
    header.addEventListener('click',e=>{
      if(e.target.closest('.phase-btn')) return;
      expanded[p.id]=!expanded[p.id]; render();
    });
    header.querySelector('[data-edit]').addEventListener('click',()=>openPhaseModal(p.id));
    header.querySelector('[data-del]').addEventListener('click',()=>{
      openConfirm(`Slet "${p.title}" og alle dens missioner?`,()=>{
        phases=phases.filter(x=>x.id!==p.id); saveData(); updateStats(); render();
        showToast('Fase slettet');
      });
    });

    // Mission list
    const list=document.createElement('div');
    list.className='mission-list'+(isOpen?' expanded':'');

    p.missions.forEach(m=>{
      const card=document.createElement('div');
      card.className='mission-card';
      card.innerHTML=`
        <div class="mission-status ${m.done?'complete':'pending'}" title="Klik for at ændre status"></div>
        <div class="mission-info">
          <div class="name">${m.name}</div>
          <div class="desc">${m.desc}</div>
        </div>
        <div class="mission-type">${m.type}</div>
        <div class="mission-actions">
          <button class="m-btn" title="Rediger">&#9998;</button>
          <button class="m-btn del" title="Slet">&times;</button>
        </div>
      `;
      card.querySelector('.mission-status').addEventListener('click',()=>{
        m.done=!m.done; saveData(); updateStats(); render();
      });
      card.querySelector('.m-btn:not(.del)').addEventListener('click',()=>openMissionModal(p.id,m.id));
      card.querySelector('.m-btn.del').addEventListener('click',()=>{
        openConfirm(`Slet mission "${m.name}"?`,()=>{
          p.missions=p.missions.filter(x=>x.id!==m.id); saveData(); updateStats(); render();
          showToast('Mission slettet');
        });
      });
      list.appendChild(card);
    });

    // Add mission button
    const addBtn=document.createElement('button');
    addBtn.className='add-mission-btn';
    addBtn.innerHTML='<span style="font-size:14px">+</span> Tilføj mission';
    addBtn.addEventListener('click',()=>openMissionModal(p.id));
    list.appendChild(addBtn);

    phaseDiv.appendChild(header);
    phaseDiv.appendChild(list);
    el.appendChild(phaseDiv);
  });
  updateStats();
}

// ===================== PHASE MODAL =====================
function openPhaseModal(editId){
  editingPhaseId=editId||null;
  const modal=document.getElementById('phaseModal');
  document.getElementById('phaseModalTitle').textContent=editId?'Rediger fase':'Ny fase';
  renderColorOptions();
  if(editId){
    const p=phases.find(x=>x.id===editId);
    document.getElementById('phaseNameInput').value=p.title;
    document.getElementById('phaseIconInput').value=p.icon;
    selectedColor=p.color;
  } else {
    document.getElementById('phaseNameInput').value='';
    document.getElementById('phaseIconInput').value='';
    selectedColor=COLORS[0].val;
  }
  renderColorOptions();
  modal.classList.add('active');
  document.getElementById('phaseNameInput').focus();
}
function closePhaseModal(){document.getElementById('phaseModal').classList.remove('active');editingPhaseId=null}
function renderColorOptions(){
  const el=document.getElementById('colorOptions');
  el.innerHTML='';
  COLORS.forEach(c=>{
    const d=document.createElement('div');
    d.className='color-opt'+(selectedColor===c.val?' selected':'');
    d.style.background=c.val;
    d.title=c.name;
    d.addEventListener('click',()=>{selectedColor=c.val;renderColorOptions()});
    el.appendChild(d);
  });
}
function savePhase(){
  const name=document.getElementById('phaseNameInput').value.trim();
  const icon=document.getElementById('phaseIconInput').value.trim()||'?';
  if(!name){showToast('Indtast et navn');return}
  if(editingPhaseId){
    const p=phases.find(x=>x.id===editingPhaseId);
    p.title=name;p.icon=icon;p.color=selectedColor;
    showToast('Fase opdateret');
  } else {
    phases.push({id:genId(),title:name,icon:icon,color:selectedColor,missions:[]});
    showToast('Fase tilføjet');
  }
  saveData();render();closePhaseModal();
}

// ===================== MISSION MODAL =====================
function openMissionModal(phaseId,missionId){
  addMissionToPhaseId=phaseId;
  editingMissionId=missionId||null;
  const modal=document.getElementById('missionModal');
  document.getElementById('missionModalTitle').textContent=missionId?'Rediger mission':'Ny mission';
  if(missionId){
    const p=phases.find(x=>x.id===phaseId);
    const m=p.missions.find(x=>x.id===missionId);
    document.getElementById('missionNameInput').value=m.name;
    document.getElementById('missionTypeInput').value=m.type;
    document.getElementById('missionDescInput').value=m.desc;
  } else {
    document.getElementById('missionNameInput').value='';
    document.getElementById('missionTypeInput').value='';
    document.getElementById('missionDescInput').value='';
  }
  modal.classList.add('active');
  document.getElementById('missionNameInput').focus();
}
function closeMissionModal(){document.getElementById('missionModal').classList.remove('active');editingMissionId=null;addMissionToPhaseId=null}
function saveMission(){
  const name=document.getElementById('missionNameInput').value.trim();
  const type=document.getElementById('missionTypeInput').value.trim()||'Ukendt';
  const desc=document.getElementById('missionDescInput').value.trim();
  if(!name){showToast('Indtast et missionsnavn');return}
  const p=phases.find(x=>x.id===addMissionToPhaseId);
  if(editingMissionId){
    const m=p.missions.find(x=>x.id===editingMissionId);
    m.name=name;m.type=type;m.desc=desc;
    showToast('Mission opdateret');
  } else {
    p.missions.push({id:genId(),name,type,desc,done:false});
    expanded[p.id]=true;
    showToast('Mission tilføjet');
  }
  saveData();render();closeMissionModal();
}

// ===================== CONFIRM =====================
function openConfirm(text,cb){
  document.getElementById('confirmText').textContent=text;
  confirmCallback=cb;
  document.getElementById('confirmDialog').classList.add('active');
}
function closeConfirm(){document.getElementById('confirmDialog').classList.remove('active');confirmCallback=null}
function doConfirm(){if(confirmCallback)confirmCallback();closeConfirm()}

// ===================== EXPAND/COLLAPSE =====================
function expandAll(){phases.forEach(p=>expanded[p.id]=true);render()}
function collapseAll(){Object.keys(expanded).forEach(k=>expanded[k]=false);render()}

// ===================== EXPORT/IMPORT =====================
function exportData(){
  const json=JSON.stringify(phases,null,2);
  const blob=new Blob([json],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='orion_missionslog_backup.json';
  a.click();URL.revokeObjectURL(a.href);
  showToast('Data eksporteret');
}
function importDataPrompt(){document.getElementById('importFile').click()}
function handleImport(e){
  const file=e.target.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=function(ev){
    try{
      const data=JSON.parse(ev.target.result);
      if(Array.isArray(data)){
        phases=data;saveData();render();
        showToast('Data importeret');
      } else { showToast('Ugyldig fil'); }
    }catch(err){showToast('Fejl ved import')}
  };
  r.readAsText(file);
  e.target.value='';
}

// ===================== KEYBOARD =====================
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){
    closePhaseModal();closeMissionModal();closeConfirm();
  }
});

// ===================== INIT =====================
createStars();
loadData();
if(phases.length>0) expanded[phases[0].id]=true;
render();
</script>
</body>
</html>
